name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.version-plan.outputs.should-build }}
      build-ref: ${{ steps.commit-bump.outputs.build-ref || steps.version-plan.outputs.build-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: npm

      - name: Decide version flow
        id: version-plan
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            echo "build-ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            echo "build-ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.head_commit.message }}" == chore:\ bump\ *\ app\ version\ to\ * ]]; then
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            echo "build-ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should-build=true" >> "$GITHUB_OUTPUT"

      - name: Bump app version
        if: ${{ steps.version-plan.outputs.should-build == 'true' && github.event_name == 'push' }}
        id: bump-version
        shell: bash
        run: |
          BUMP_RESULT="$(node scripts/bump-app-version.cjs --from "${{ github.event.before }}" --to "${{ github.sha }}" --json)"
          NEXT_VERSION="$(printf '%s' "$BUMP_RESULT" | node -e "const data = JSON.parse(require('fs').readFileSync(0, 'utf8')); process.stdout.write(data.nextVersion)")"
          BUMP_TYPE="$(printf '%s' "$BUMP_RESULT" | node -e "const data = JSON.parse(require('fs').readFileSync(0, 'utf8')); process.stdout.write(data.bumpType)")"
          echo "value=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "type=${BUMP_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        if: ${{ steps.version-plan.outputs.should-build == 'true' && github.event_name == 'push' }}
        id: commit-bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/environments/environment.ts src/environments/environment.development.ts
          git commit -m "chore: bump ${{ steps.bump-version.outputs.type }} app version to ${{ steps.bump-version.outputs.value }}"
          git push
          echo "build-ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    if: ${{ needs.bump-version.outputs.should-build == 'true' }}
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-version.outputs.build-ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm i

      - name: Compute base href
        id: base-href
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%/*}"

          if [[ -f public/CNAME ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          elif [[ "$REPO_NAME" == "${OWNER_NAME}.github.io" ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Angular app
        run: npm run build -- --base-href "${{ steps.base-href.outputs.value }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/lilies-shed/browser

  deploy:
    if: ${{ needs.bump-version.outputs.should-build == 'true' }}
    needs:
      - bump-version
      - build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
