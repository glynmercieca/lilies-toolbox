name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  bump-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore: bump app version to ')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: npm

      - name: Bump app version
        id: bump-version
        shell: bash
        run: |
          NEXT_VERSION="$(node scripts/bump-app-version.cjs)"
          echo "value=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/environments/environment.ts src/environments/environment.development.ts
          git commit -m "chore: bump app version to ${{ steps.bump-version.outputs.value }}"
          git push

  build:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore: bump app version to '))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm i

      - name: Compute base href
        id: base-href
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%/*}"

          if [[ -f public/CNAME ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          elif [[ "$REPO_NAME" == "${OWNER_NAME}.github.io" ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Angular app
        run: npm run build -- --base-href "${{ steps.base-href.outputs.value }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/lilies-shed/browser

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore: bump app version to '))
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
