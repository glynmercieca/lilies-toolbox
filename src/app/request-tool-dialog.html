<h2 mat-dialog-title>Request tool</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="d-grid gap-3 pt-1">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" maxlength="120" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Message</mat-label>
      <textarea matInput formControlName="message" rows="5" maxlength="1000"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="saving()">Cancel</button>
  <button mat-flat-button type="button" (click)="submit()" [disabled]="saving()">
    @if (saving()) {
      <mat-spinner diameter="18"></mat-spinner>
    } @else {
      Send
    }
  </button>
</mat-dialog-actions>
