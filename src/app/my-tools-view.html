<section class="tool-section d-grid gap-3">
  <mat-card appearance="outlined" class="tool-section-summary-card">
    <mat-card-content class="tool-section-summary-content">
      <div class="tool-section-summary-top">
        <div>
          <div class="tool-section-summary-label">Your inventory</div>
          <div class="tool-section-summary-value">{{ state.ownedTools().length }} listed tools</div>
        </div>
        <button mat-icon-button type="button" matTooltip="Statistics" matTooltipPosition="left" (click)="openStats()" aria-label="Open my tools statistics">
          <mat-icon class="material-symbols-outlined">pie_chart</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <div class="row row-cols-2 row-cols-lg-3 g-3 tool-section-grid">
    @for (tool of state.pagedOwnedTools(); track tool.id) {
    <div class="col d-flex">
      <app-tool-card class="w-100" mode="my-tools" [tool]="tool" (view)="state.openTool($event, 'my-tools')" />
    </div>
    } @empty {
    <div class="col-12 empty-state-column">
      <div class="empty-state">
        <div class="empty-state-art" aria-hidden="true">
          <mat-icon class="material-symbols-outlined">home_repair_service</mat-icon>
        </div>
        <p class="empty-state-title">No tools listed yet</p>
        <p class="empty-state-message">Use the add button to create your first listing.</p>
      </div>
    </div>
    }
  </div>

  @if (state.hasMoreOwnedTools()) {
  <div class="tool-section-pager" appViewportSentinel (appViewportSentinel)="state.showMoreOwnedTools()"
    aria-label="Loading more tools">
    <mat-spinner diameter="28"></mat-spinner>
  </div>
  }

  <button mat-fab type="button" class="add-tool-fab" (click)="state.addTool()" aria-label="Add tool">
    <mat-icon class="material-symbols-outlined">add</mat-icon>
  </button>
</section>
