<section class="tool-section d-grid gap-3">
  <header class="tool-section-header d-grid gap-1">
    <h1 class="m-0 d-flex align-items-center gap-2">
      <mat-icon class="material-symbols-outlined">handyman</mat-icon>
      <span>My Tools</span>
    </h1>
    <p class="m-0 text-body-secondary">Manage tools you own and add new ones.</p>
  </header>

  <mat-card appearance="outlined" class="tool-section-summary-card">
    <mat-card-content class="tool-section-summary-content">
      <div class="tool-section-summary-top">
        <div>
          <div class="tool-section-summary-label">Your inventory</div>
          <div class="tool-section-summary-value">{{ state.ownedTools().length }} listed tools</div>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <div class="row row-cols-2 row-cols-lg-3 g-3 tool-section-grid">
    @for (tool of state.ownedTools(); track tool.id) {
    <div class="col d-flex">
      <app-tool-card class="w-100" mode="my-tools" [tool]="tool" [saving]="state.savingToolId() === tool.id"
        (delete)="state.deleteTool($event)" (edit)="state.editTool($event)" />
    </div>
    } @empty {
    <div class="col-12">
      <mat-card appearance="outlined">
        <mat-card-content class="flex-grow-1">
          <p class="m-0">You have not added any tools yet.</p>
          <p class="m-0 mt-3">Use the add button to create your first listing.</p>
        </mat-card-content>
      </mat-card>
    </div>
    }
  </div>

  <button mat-fab type="button" class="add-tool-fab" (click)="state.addTool()" aria-label="Add tool">
    <mat-icon class="material-symbols-outlined">add</mat-icon>
  </button>
</section>
