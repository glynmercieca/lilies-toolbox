<section class="tool-section d-grid gap-3">
  <mat-card appearance="outlined" class="tool-section-summary-card">
    <mat-card-content class="tool-section-summary-content">
      <div class="tool-section-summary-top">
        <div>
          <div class="tool-section-summary-label">Currently with you</div>
          <div class="tool-section-summary-value">{{ borrowedToolsSummary }}</div>
        </div>
        <button mat-icon-button type="button" matTooltip="Statistics" matTooltipPosition="left" (click)="openStats()" aria-label="Open borrowed tools statistics">
          <mat-icon class="material-symbols-outlined">pie_chart</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <div class="row row-cols-2 row-cols-lg-3 g-3 tool-section-grid">
    @for (tool of state.pagedBorrowedTools(); track tool.id) {
    <div class="col d-flex">
      <app-tool-card class="w-100" mode="borrowed" [tool]="tool" (view)="state.openTool($event, 'borrowed')" />
    </div>
    } @empty {
    <div class="col-12 empty-state-column">
      <div class="empty-state">
        <div class="empty-state-art" aria-hidden="true">
          <mat-icon class="material-symbols-outlined">hand_package</mat-icon>
        </div>
        <p class="empty-state-title">No borrowed tools right now</p>
        <p class="empty-state-message">Borrowed items will appear here while they are checked out to you.</p>
      </div>
    </div>
    }
  </div>

  @if (state.hasMoreBorrowedTools()) {
  <div class="tool-section-pager" appViewportSentinel (appViewportSentinel)="state.showMoreBorrowedTools()"
    aria-label="Loading more tools">
    <mat-spinner diameter="28"></mat-spinner>
  </div>
  }
</section>
