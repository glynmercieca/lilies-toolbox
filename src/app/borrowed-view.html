<section class="tool-section d-grid gap-3">
  <mat-card appearance="outlined" class="tool-section-summary-card">
    <mat-card-content class="tool-section-summary-content">
      <div class="tool-section-summary-top">
        <div>
          <div class="tool-section-summary-label">Currently with you</div>
          <div class="tool-section-summary-value">{{ borrowedToolsSummary }}</div>
        </div>
        <button mat-icon-button type="button" (click)="openStats()" aria-label="Open borrowed tools statistics">
          <mat-icon class="material-symbols-outlined">pie_chart</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <div class="row row-cols-2 row-cols-lg-3 g-3 tool-section-grid">
    @for (tool of state.borrowedTools(); track tool.id) {
    <div class="col d-flex">
      <app-tool-card class="w-100" mode="borrowed" [tool]="tool" (view)="state.openTool($event, 'borrowed')" />
    </div>
    } @empty {
    <div class="col-12">
      <mat-card appearance="outlined">
        <mat-card-content class="flex-grow-1">
          <p class="m-0 fs-5">No borrowed tools right now.</p>
          <p class="m-0 mt-3 text-body-secondary">
            Borrowed items will appear here while they are checked out to you.
          </p>
        </mat-card-content>
      </mat-card>
    </div>
    }
  </div>
</section>
